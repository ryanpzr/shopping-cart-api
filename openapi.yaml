openapi: 3.0.3

info:
  title: Shopping Cart API
  description: REST API for a shopping cart system. Handles authentication, user management, products, cart and orders.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: Auth
    description: Public routes — no token required
  - name: User
    description: Authenticated user — own profile management
  - name: Admin
    description: Admin-only — user administration
  - name: Products
    description: Product catalog management

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ─── Auth ───────────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          minLength: 8
          example: password123

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          example: password123

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserPublic'
        token:
          type: string
          example: eyJhbGci...

    # ─── User ───────────────────────────────────────────────────────────────
    UserPublic:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: John Doe
        email:
          type: string
          example: john@example.com
        role:
          type: string
          enum: [client, admin]
          example: client
        status:
          type: string
          enum: [active, banned, timeout]
          example: active
        created_at:
          type: string
          format: date-time

    UserProfile:
      allOf:
        - $ref: '#/components/schemas/UserPublic'
        - type: object
          properties:
            updated_at:
              type: string
              format: date-time

    UserAdmin:
      allOf:
        - $ref: '#/components/schemas/UserProfile'
        - type: object
          properties:
            timeout_until:
              type: string
              format: date-time
              nullable: true

    UpdateMeRequest:
      type: object
      properties:
        name:
          type: string
          example: New Name
        email:
          type: string
          format: email
          example: newemail@example.com

    TimeoutRequest:
      type: object
      required: [duration_hours]
      properties:
        duration_hours:
          type: integer
          minimum: 1
          example: 24

    ManageUserResponse:
      type: object
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          example: John Doe
        email:
          type: string
          example: john@example.com
        role:
          type: string
          enum: [client, admin]
          example: client
        status:
          type: string
          enum: [active, banned, timeout]
          example: banned
        timeout_until:
          type: string
          format: date-time
          nullable: true
          example: null
        updated_at:
          type: string
          format: date-time
          example: "2025-01-15T10:30:00Z"

    PaginatedUsers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserPublic'
        total:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total_pages:
          type: integer
          example: 5

    ActivityLogResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        total:
          type: integer
          example: 0
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total_pages:
          type: integer
          example: 0

    # ─── Product ────────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        seller_id:
          type: integer
          example: 2
        photo:
          type: string
          nullable: true
          example: https://cdn.example.com/photo.jpg
        title:
          type: string
          example: Wireless Headphones
        description:
          type: string
          nullable: true
          example: Noise-cancelling over-ear headphones
        price:
          type: number
          format: float
          example: 199.90
        discount_percentage:
          type: integer
          minimum: 0
          maximum: 100
          example: 10
        final_price:
          type: number
          format: float
          description: Computed — price * (1 - discount_percentage / 100)
          example: 179.91
        quantity:
          type: integer
          minimum: 0
          example: 50
        status:
          type: string
          enum: [active, inactive]
          example: active
        category:
          type: string
          nullable: true
          example: Electronics
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProductListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        meta:
          type: object
          properties:
            total:
              type: integer
              example: 100
            limit:
              type: integer
              example: 20
            offset:
              type: integer
              example: 0

    CreateProductRequest:
      type: object
      required: [title, price, quantity]
      properties:
        photo:
          type: string
          nullable: true
          example: https://cdn.example.com/photo.jpg
        title:
          type: string
          example: Wireless Headphones
        description:
          type: string
          nullable: true
          example: Noise-cancelling over-ear headphones
        price:
          type: number
          format: float
          minimum: 0.01
          example: 199.90
        discount_percentage:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
          example: 10
        quantity:
          type: integer
          minimum: 0
          example: 50
        category:
          type: string
          nullable: true
          example: Electronics

    UpdateProductRequest:
      type: object
      description: Partial update — omit fields you do not want to change
      properties:
        photo:
          type: string
          nullable: true
          example: https://cdn.example.com/new-photo.jpg
        title:
          type: string
          example: Updated Title
        description:
          type: string
          nullable: true
          example: Updated description
        price:
          type: number
          format: float
          minimum: 0.01
          example: 149.90
        discount_percentage:
          type: integer
          minimum: 0
          maximum: 100
          example: 15
        quantity:
          type: integer
          minimum: 0
          example: 30
        category:
          type: string
          nullable: true
          example: Electronics

    ToggleStatusResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        status:
          type: string
          enum: [active, inactive]
          example: inactive

    DeleteResponse:
      type: object
      properties:
        message:
          type: string
          example: product deleted successfully

    # ─── Errors ─────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: descriptive error message

# ─── Paths ──────────────────────────────────────────────────────────────────
paths:

  # Auth ─────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: John Doe
              email: john@example.com
              password: password123
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: john@example.com
              password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account restricted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # User — Client ────────────────────────────────────────────────────────────
  /users/me:
    get:
      tags: [User]
      summary: Get own profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [User]
      summary: Update own profile (name and/or email)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
            examples:
              update_name_only:
                summary: Update only name
                value:
                  name: New Name
              update_email_only:
                summary: Update only email
                value:
                  email: newemail@example.com
              update_both:
                summary: Update both fields
                value:
                  name: New Name
                  email: newemail@example.com
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Invalid or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # User — Admin ─────────────────────────────────────────────────────────────
  /admin/users:
    get:
      tags: [Admin]
      summary: List all users (paginated)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/{id}:
    get:
      tags: [Admin]
      summary: Get user by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Full user object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAdmin'
        '400':
          description: Invalid ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/{id}/ban:
    patch:
      tags: [Admin]
      summary: Ban a user
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User banned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageUserResponse'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient role or target is admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/{id}/timeout:
    patch:
      tags: [Admin]
      summary: Temporarily restrict a user
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeoutRequest'
            examples:
              one_hour:
                summary: 1 hour timeout
                value:
                  duration_hours: 1
              one_day:
                summary: 24 hour timeout
                value:
                  duration_hours: 24
              one_week:
                summary: 1 week timeout
                value:
                  duration_hours: 168
      responses:
        '200':
          description: User timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageUserResponse'
        '400':
          description: Invalid or missing duration_hours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient role or target is admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/{id}/unban:
    patch:
      tags: [Admin]
      summary: Remove ban or timeout from a user
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User restriction removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageUserResponse'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient role or target is admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/{id}/activity:
    get:
      tags: [Admin]
      summary: Get activity log for a user (stub — returns empty list)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated activity log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityLogResponse'
        '400':
          description: Invalid user ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Products ─────────────────────────────────────────────────────────────────
  /products:
    get:
      tags: [Products]
      summary: List active products (public)
      description: Returns only products with status=active. Supports filters and pagination.
      parameters:
        - name: category
          in: query
          schema:
            type: string
          example: Electronics
        - name: min_price
          in: query
          schema:
            type: number
          example: 10.00
        - name: max_price
          in: query
          schema:
            type: number
          example: 500.00
        - name: search
          in: query
          description: Case-insensitive match against product title
          schema:
            type: string
          example: headphone
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          example: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          example: 0
      responses:
        '200':
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
              example:
                data:
                  - id: 1
                    seller_id: 2
                    photo: https://cdn.example.com/photo.jpg
                    title: Wireless Headphones
                    description: Noise-cancelling over-ear headphones
                    price: 199.90
                    discount_percentage: 10
                    final_price: 179.91
                    quantity: 50
                    status: active
                    category: Electronics
                    created_at: "2025-01-01T00:00:00Z"
                    updated_at: "2025-01-01T00:00:00Z"
                meta:
                  total: 1
                  limit: 20
                  offset: 0

    post:
      tags: [Products]
      summary: Create a product
      security:
        - BearerAuth: []
      description: seller_id is injected from the JWT — do not send it in the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
            example:
              title: Wireless Headphones
              price: 199.90
              quantity: 50
              photo: https://cdn.example.com/photo.jpg
              description: Noise-cancelling over-ear headphones
              discount_percentage: 10
              category: Electronics
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_title:
                  value:
                    error: title is required
                invalid_price:
                  value:
                    error: price must be greater than 0
                invalid_discount:
                  value:
                    error: discount_percentage must be between 0 and 100
                negative_quantity:
                  value:
                    error: quantity must be >= 0
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product by ID (public)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid product ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found or inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Products]
      summary: Update a product (partial — owner only)
      security:
        - BearerAuth: []
      description: Partial update — only send the fields you want to change. seller_id is ignored even if sent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
            example:
              price: 149.90
              discount_percentage: 15
      responses:
        '200':
          description: Updated product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid field values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not the owner of this product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Products]
      summary: Delete a product (owner or admin)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not the owner and not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Product has active orders (pending/paid/shipped)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{id}/status:
    patch:
      tags: [Products]
      summary: Toggle product visibility (owner only)
      security:
        - BearerAuth: []
      description: Toggles between active and inactive. Inactive products are hidden from the public listing.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Status toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToggleStatusResponse'
              examples:
                deactivated:
                  summary: Product deactivated
                  value:
                    id: 1
                    status: inactive
                activated:
                  summary: Product activated
                  value:
                    id: 1
                    status: active
        '400':
          description: Invalid product ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not the owner of this product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
